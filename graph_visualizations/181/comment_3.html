<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ACE Dependency Graph — article 181, comment 3</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #fafafa;
    color: #222;
    overflow: hidden;
  }
  #header {
    padding: 12px 20px 8px;
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
    display: flex;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
  }
  #header h1 {
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
  }
  #header .hint {
    font-size: 12px;
    color: #888;
  }
  #graph-container {
    position: relative;
    width: 100vw;
  }
  svg { display: block; }
  .node-label {
    font-size: 11px;
    line-height: 1.35;
    color: #222;
    padding: 6px 8px;
    overflow: hidden;
    word-wrap: break-word;
    cursor: grab;
    user-select: none;
  }
  #legend {
    position: absolute;
    top: 12px;
    right: 16px;
    background: rgba(255,255,255,0.93);
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 12px;
    line-height: 1.7;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    max-height: calc(100vh - 140px);
    overflow-y: auto;
    z-index: 50;
  }
  #legend .title { font-weight: 600; margin-bottom: 4px; }
  #legend .item { display: flex; align-items: center; gap: 7px; }
  #legend .swatch {
    width: 13px; height: 13px; border-radius: 3px; flex-shrink: 0;
    border: 1px solid rgba(0,0,0,0.15);
  }
  #comment-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #fffde7;
    border-top: 1px solid #e0d88a;
    padding: 10px 20px;
    font-size: 12px;
    font-style: italic;
    color: #555;
    max-height: 100px;
    overflow-y: auto;
    line-height: 1.5;
  }
  #tooltip {
    position: absolute;
    pointer-events: none;
    background: rgba(30,30,30,0.92);
    color: #fff;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 12px;
    line-height: 1.45;
    max-width: 360px;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 100;
  }
  #tooltip .cat { color: #aaa; font-size: 11px; margin-top: 3px; }
</style>
</head>
<body>
<div id="header">
  <h1>ACE Dependency Graph — article 181, comment 3</h1>
  <span class="hint">Hover a node to highlight its edges. Drag nodes to rearrange. Scroll to zoom.</span>
</div>
<div id="graph-container">
  <svg id="graph"></svg>
  <div id="legend"></div>
  <div id="tooltip"></div>
</div>
<div id="comment-bar">hello i am brody and I think over 25 gigawatts is crazy.</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
<script>
(function() {
  const nodes = [{"id": 0, "sentence": "My name is Brody.", "category": "Personal/episodic retrieval", "color": "#9467bd"}, {"id": 1, "sentence": "I think that more than 25 gigawatts is crazy.", "category": "Evaluative / affective judgment", "color": "#7f7f7f"}];
  const links = [];
  const legendItems = [{"category": "Personal/episodic retrieval", "color": "#9467bd"}, {"category": "Evaluative / affective judgment", "color": "#7f7f7f"}];

  const NODE_W = 180;
  const PAD_X = 8, PAD_Y = 6;
  const LINE_H = 14;
  const CHAR_W = 6.2;
  const CHARS_PER_LINE = Math.floor((NODE_W - PAD_X * 2) / CHAR_W);

  function wrapText(text) {
    const words = text.split(/\s+/);
    const lines = [];
    let cur = "";
    words.forEach(w => {
      const test = cur ? cur + " " + w : w;
      if (test.length > CHARS_PER_LINE && cur) {
        lines.push(cur);
        cur = w;
      } else {
        cur = test;
      }
    });
    if (cur) lines.push(cur);
    return lines;
  }

  nodes.forEach(n => {
    const lines = wrapText(n.sentence);
    n.nodeW = NODE_W;
    n.nodeH = Math.max(30, lines.length * LINE_H + PAD_Y * 2);
    n.lines = lines;
  });

  const commentBarH = document.getElementById("comment-bar").offsetHeight;
  const headerH = document.getElementById("header").offsetHeight;
  const width = window.innerWidth;
  const height = window.innerHeight - headerH - commentBarH;

  const container = document.getElementById("graph-container");
  container.style.height = height + "px";

  const svg = d3.select("#graph")
    .attr("width", width)
    .attr("height", height);

  const g = svg.append("g");

  const zoom = d3.zoom()
    .scaleExtent([0.05, 6])
    .on("zoom", (event) => g.attr("transform", event.transform));
  svg.call(zoom);

  const defs = svg.append("defs");

  function addMarker(id, color) {
    defs.append("marker")
      .attr("id", id)
      .attr("viewBox", "0 -5 10 10")
      .attr("refX", 10)
      .attr("refY", 0)
      .attr("markerWidth", 8)
      .attr("markerHeight", 8)
      .attr("orient", "auto")
      .append("path")
      .attr("d", "M0,-4L10,0L0,4")
      .attr("fill", color);
  }
  addMarker("arrow", "#6a9fd8");
  addMarker("arrow-dim", "#ddd");
  addMarker("arrow-hl", "#1a5ea0");

  // Dagre hierarchical layout
  const nodeById = new Map(nodes.map(n => [n.id, n]));
  const gDagre = new dagre.graphlib.Graph();
  gDagre.setGraph({ rankdir: "TB", nodesep: 25, ranksep: 50, marginx: 20, marginy: 20 });
  gDagre.setDefaultEdgeLabel(() => ({}));
  nodes.forEach(n => gDagre.setNode(n.id, { width: n.nodeW, height: n.nodeH }));
  links.forEach(l => gDagre.setEdge(l.source, l.target));
  dagre.layout(gDagre);
  nodes.forEach(n => {
    const pos = gDagre.node(n.id);
    n.x = pos.x - n.nodeW / 2;
    n.y = pos.y - n.nodeH / 2;
  });
  links.forEach(l => {
    if (typeof l.source !== "object") l.source = nodeById.get(l.source);
    if (typeof l.target !== "object") l.target = nodeById.get(l.target);
  });

  const linkSel = g.append("g")
    .selectAll("line")
    .data(links)
    .join("line")
    .attr("stroke", "#6a9fd8")
    .attr("stroke-width", 2)
    .attr("stroke-opacity", 0.55)
    .attr("marker-end", "url(#arrow)");

  const nodeGroup = g.append("g")
    .selectAll("g")
    .data(nodes)
    .join("g")
    .attr("cursor", "grab");

  const rectSel = nodeGroup.append("rect")
    .attr("width", d => d.nodeW)
    .attr("height", d => d.nodeH)
    .attr("rx", 6).attr("ry", 6)
    .attr("fill", d => d.color)
    .attr("fill-opacity", 0.22)
    .attr("stroke", d => d.color)
    .attr("stroke-width", 2)
    .attr("stroke-opacity", 0.7);

  const textSel = nodeGroup.each(function(d) {
    const group = d3.select(this);
    const t = group.append("text")
      .attr("x", d.nodeW / 2)
      .attr("text-anchor", "middle")
      .attr("font-size", "11px")
      .attr("fill", "#222")
      .attr("pointer-events", "none");
    const startY = PAD_Y + LINE_H * 0.8;
    d.lines.forEach((line, i) => {
      t.append("tspan")
        .attr("x", d.nodeW / 2)
        .attr("y", startY + i * LINE_H)
        .text(line);
    });
  });

  const tooltip = d3.select("#tooltip");

  const adjacency = new Map();
  nodes.forEach(n => adjacency.set(n.id, new Set()));
  links.forEach(l => {
    const s = (typeof l.source === "object") ? l.source.id : l.source;
    const t = (typeof l.target === "object") ? l.target.id : l.target;
    adjacency.get(s).add(t);
    adjacency.get(t).add(s);
  });

  function isConnected(a, b) {
    return a === b || adjacency.get(a).has(b);
  }

  function rectEdgePoint(cx, cy, w, h, tx, ty) {
    const dx = tx - cx, dy = ty - cy;
    if (dx === 0 && dy === 0) return [cx, cy];
    const hw = w / 2, hh = h / 2;
    const absDx = Math.abs(dx), absDy = Math.abs(dy);
    let scale;
    if (absDx / hw > absDy / hh) {
      scale = hw / absDx;
    } else {
      scale = hh / absDy;
    }
    return [cx + dx * scale, cy + dy * scale];
  }

  nodeGroup
    .on("mouseenter", function(event, d) {
      rectSel
        .attr("fill-opacity", o => isConnected(d.id, o.id) ? 0.35 : 0.06)
        .attr("stroke-opacity", o => isConnected(d.id, o.id) ? 1 : 0.1);
      nodeGroup.selectAll("text")
        .attr("fill-opacity", function() {
          const o = d3.select(this.parentNode).datum();
          return isConnected(d.id, o.id) ? 1 : 0.12;
        });
      linkSel
        .attr("stroke-opacity", l => {
          const s = (typeof l.source === "object") ? l.source.id : l.source;
          const t = (typeof l.target === "object") ? l.target.id : l.target;
          return (s === d.id || t === d.id) ? 0.85 : 0.06;
        })
        .attr("stroke", l => {
          const s = (typeof l.source === "object") ? l.source.id : l.source;
          const t = (typeof l.target === "object") ? l.target.id : l.target;
          return (s === d.id || t === d.id) ? "#1a5ea0" : "#ddd";
        })
        .attr("stroke-width", l => {
          const s = (typeof l.source === "object") ? l.source.id : l.source;
          const t = (typeof l.target === "object") ? l.target.id : l.target;
          return (s === d.id || t === d.id) ? 3 : 1;
        })
        .attr("marker-end", l => {
          const s = (typeof l.source === "object") ? l.source.id : l.source;
          const t = (typeof l.target === "object") ? l.target.id : l.target;
          return (s === d.id || t === d.id) ? "url(#arrow-hl)" : "url(#arrow-dim)";
        });

      tooltip
        .style("opacity", 1)
        .html("<strong>" + d.id + ":</strong> " + d.sentence + "<div class='cat'>" + d.category + "</div>");
    })
    .on("mousemove", function(event) {
      const [mx, my] = d3.pointer(event, container);
      tooltip
        .style("left", (mx + 18) + "px")
        .style("top", (my - 10) + "px");
    })
    .on("mouseleave", function() {
      rectSel.attr("fill-opacity", 0.22).attr("stroke-opacity", 0.7);
      nodeGroup.selectAll("text").attr("fill-opacity", 1);
      linkSel
        .attr("stroke", "#6a9fd8")
        .attr("stroke-opacity", 0.55)
        .attr("stroke-width", 2)
        .attr("marker-end", "url(#arrow)");
      tooltip.style("opacity", 0);
    });

  function updatePositions() {
    nodeGroup.attr("transform", d => "translate(" + d.x + "," + d.y + ")");
    linkSel.each(function(d) {
      const sx = d.source.x + d.source.nodeW / 2;
      const sy = d.source.y + d.source.nodeH / 2;
      const tx = d.target.x + d.target.nodeW / 2;
      const ty = d.target.y + d.target.nodeH / 2;
      const [x1, y1] = rectEdgePoint(sx, sy, d.source.nodeW, d.source.nodeH, tx, ty);
      const [x2, y2] = rectEdgePoint(tx, ty, d.target.nodeW, d.target.nodeH, sx, sy);
      d3.select(this)
        .attr("x1", x1).attr("y1", y1)
        .attr("x2", x2).attr("y2", y2);
    });
  }

  const drag = d3.drag()
    .on("drag", (event, d) => {
      d.x = event.x;
      d.y = event.y;
      updatePositions();
    });
  nodeGroup.call(drag);

  updatePositions();

  // Legend
  const leg = d3.select("#legend");
  leg.append("div").attr("class", "title").text("Category");
  legendItems.forEach(item => {
    const row = leg.append("div").attr("class", "item");
    row.append("div").attr("class", "swatch").style("background", item.color);
    row.append("span").text(item.category);
  });

  // Fit to view (dagre positions are known immediately)
  ;(function() {
    const pad = 80;
    let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
    nodes.forEach(n => {
      if (n.x < x0) x0 = n.x;
      if (n.y < y0) y0 = n.y;
      const nr = n.x + n.nodeW;
      const nb = n.y + n.nodeH;
      if (nr > x1) x1 = nr;
      if (nb > y1) y1 = nb;
    });
    const bw = x1 - x0 + pad * 2;
    const bh = y1 - y0 + pad * 2;
    const scale = Math.min(width / bw, height / bh, 1.5);
    const cx = (x0 + x1) / 2;
    const cy = (y0 + y1) / 2;
    const tx = width / 2 - scale * cx;
    const ty = height / 2 - scale * cy;
    svg.transition().duration(600).call(
      zoom.transform,
      d3.zoomIdentity.translate(tx, ty).scale(scale)
    );
  })();
})();
</script>
</body>
</html>
